name: Publish to MCP Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.8.1). Defaults to version in server.json."
        required: false
        type: string

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Update server.json version
        if: ${{ inputs.version != '' }}
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v | .packages[0].version = $v' server.json > server.tmp.json
          mv server.tmp.json server.json

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
